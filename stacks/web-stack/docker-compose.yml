services:
  app:
    build: ./app
    container_name: nodejs-app
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    networks:
      - webnet

  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    restart: unless-stopped
    ports:
      - "8090:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    networks:
      - webnet

networks:
  webnet:
    driver: bridge
