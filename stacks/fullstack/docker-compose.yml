services:
  api:
    build: ./app
    container_name: node-api
    restart: unless-stopped
    ports:
      - "8091:3000"
    environment:
      - MONGO_URL=mongodb://mongo:27017/myapp
    depends_on:
      - mongo
    networks:
      - appnet

  mongo:
    image: mongo:6.0
    container_name: mongodb
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    networks:
      - appnet

volumes:
  mongo_data:

networks:
  appnet:
    driver: bridge
